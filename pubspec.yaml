environment:
  sdk: '^3.10.9'

# https://dart.dev/tools/pub/workspaces
workspace:
  - packages/ui

dependencies:
  flutter:
    sdk: flutter

  #flutter_web_plugins:
  #  sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any
  intl_utils: ^2.8.14

  # Routing
  octopus: ^0.0.9

  # Utility
  collection: any
  platform_info: ^5.0.0
  #multiline: ^3.0.0
  path: ^1.9.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

  # Logger
  l: ^5.0.0

  # Desktop
  win32: ^5.11.0
  window_manager: ^0.5.1

  # State management
  control:
    git:
      url: https://github.com/PlugFox/control.git
      ref: master

  # Networking
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  dart_pusher_channels: ^1.3.1

  # UI and Widgets
  cupertino_icons: ^1.0.9
  #google_fonts: ^6.2.1
  #font_awesome_flutter: ^10.7.0

  # Web
  web: ^1.1.0

  ui:
    path: ./packages/ui
#  freezed_annotation: ^3.1.0

  meta: any
  json_annotation: any
dev_dependencies:
  # Unit & Widget tests for Flutter
  flutter_test:
    sdk: flutter
  # Integration tests for Flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  test: any
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.5.4
  pubspec_generator: ^5.0.0
  flutter_gen_runner: ^5.9.0
  # dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
  flutter_launcher_icons: ^0.14.3
  # dart run flutter_native_splash:create --path=flutter_native_splash.yaml
  flutter_native_splash: ^2.4.5
#  freezed: ^3.1.0


flutter:
  generate: true
  uses-material-design: true

  shaders:
    - packages/ui/shaders/shimmer.frag

  assets:
    - assets/icons/

flutter_intl:
  enabled: true
  class_name: GeneratedLocalization
  main_locale: en
  arb_dir: lib/src/common/localization
  output_dir: lib/src/common/localization/generated
  use_deferred_loading: false

flutter_gen:
  output: lib/src/common/constant/
  line_length: 120